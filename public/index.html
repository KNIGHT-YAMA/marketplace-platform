<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace Platform</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #333; }
    .form-group { margin-bottom: 15px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; }
    input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; background: #007bff; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    button:hover { background: #0056b3; }
    .hidden { display: none; }
    .package-card { border: 2px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: #fafafa; }
    .balance-card { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
    .balance-amount { font-size: 1.8em; color: #28a745; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- REGISTRATION AREA -->
    <div id="registration-section">
      <h2>Register Account</h2>
      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="Enter Full Name" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="Enter Email" required>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="Enter Phone Number" required>
        </div>
        <button type="submit">Register</button>
      </form>
    </div>

    <!-- CLIENT DASHBOARD (Hidden until registered) -->
    <div id="dashboard-section" class="hidden">
      <h2 id="welcomeText">Welcome!</h2>
      
      <div class="balance-card">
        <div>Account Balance</div>
        <div class="balance-amount" id="balanceDisplay">KES 0.00</div>
        <small style="color: #6c757d;">(Visible even after withdrawals)</small>
      </div>

      <h3>Available Packages</h3>
      <div id="packageList"></div>
    </div>

  </div>

  <script>
    async function handleRegister(e) {
      e.preventDefault();
      const fullName = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;

      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fullName, email, phone })
      });
      
      const data = await res.json();
      
      if (res.ok) {
        document.getElementById('registration-section').classList.add('hidden');
        document.getElementById('dashboard-section').classList.remove('hidden');
        document.getElementById('welcomeText').innerText = `Welcome, ${data.user.fullName}!`;
        
        loadPackages();
      }
    }

    async function loadPackages() {
      const res = await fetch('/api/packages');
      const packages = await res.json();
      const pkgContainer = document.getElementById('packageList');
      pkgContainer.innerHTML = '';

      packages.forEach(pkg => {
        const div = document.createElement('div');
        div.className = 'package-card';
        div.innerHTML = `
          <h4 style="margin:0 0 8px 0; color:#007bff;">Package KES ${pkg.price}</h4>
          <ul style="padding-left: 20px; margin: 0 0 10px 0;">
            <li>${pkg.ratePerView}</li>
            <li>${pkg.postingDays}</li>
            <li>${pkg.payoutCycle}</li>
          </ul>
          <button style="background:#28a745;" onclick="alert('Purchase options coming next!')">Purchase Package</button>
        `;
        pkgContainer.appendChild(div);
      });
    }
  </script>
</body>
</html>
