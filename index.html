<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Marketplace Platform</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background: #f4f4f9; }
    .card { background: white; padding: 30px; display: inline-block; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    button { background: #007bff; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Marketplace Platform</h1>
    <p>Backend is connected and static frontend is working!</p>
    <button onclick="checkStatus()">Check Backend Status</button>
    <h3 id="status" style="color: #28a745; margin-top: 20px;"></h3>
  </div>

  <script>
    async function checkStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        document.getElementById('status').innerText = data.message;
      } catch (err) {
        document.getElementById('status').innerText = 'Error connecting to API';
      }
    }
  </script>
</body>
</html>
